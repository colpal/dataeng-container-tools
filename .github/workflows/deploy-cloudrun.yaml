name: Deploy Cloud Run Service

on:
  workflow_dispatch:

jobs:
  deploy-cloudrun:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Google Auth
        id: google-auth
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3.0.0
        with:
          workload_identity_provider: ${{ secrets.WI_PROVIDER }}

      - name: Setup gcloud
        id: setup-gcloud
        uses: google-github-actions/setup-gcloud@aa5489c8933f4cc7a4f7d45035b3b1440c9c10db # v3.0.1
        with:
          version: "559.0.0"

      - name: Deploy Cloud Run service with GCS volume mount
        run: |
          gcloud run deploy "dataeng-container-tools" \
            --image=nginx:alpine \
            --region=${{ secrets.CR_REGION }} \
            --project=${{ secrets.CR_PROJECT }} \
            --service-account=${{ secrets.CR_SA }} \
            --port=80 \
            --add-volume=name=gcs-docs,type=cloud-storage,bucket=${{ secrets.CR_BUCKET }} \
            --add-volume-mount=volume=gcs-docs,mount-path=/usr/share/nginx/html \
            --cpu=1 \
            --memory=512Mi \
            --min-instances=0 \
            --no-deploy-health-check \
            --iap
