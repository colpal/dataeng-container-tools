name: Build and Deploy Docs

on:
  push:
    branches:
      - feature/v1-docs
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  build-and-upload-docs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "0.9.24"

      - name: Build documentation
        run: uv run python docs/make.py --html

      - name: Google Auth
        id: google-auth
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.WI_PROVIDER }}

      - name: Setup gcloud
        id: setup-gcloud
        uses: google-github-actions/setup-gcloud@v3

      - name: Upload docs to GCS
        run: |
          gcloud config set project ${{ secrets.CR_PROJECT }}
          gsutil -m rsync -r -d docs/src/build/html gs://${{ secrets.CR_BUCKET }}/
          gsutil -m setmeta -h "Cache-Control:public, max-age=3600" gs://${{ secrets.CR_BUCKET }}/**
