site_name: Data-Engineering Container Tools
site_description: A package containing tools for data engineering containers
site_url: https://dataeng-container-tools-515523808041.us-east4.run.app/
edit_uri: edit/main/docs/

repo_name: colpal/dataeng-container-tools
repo_url: https://github.com/colpal/dataeng-container-tools

copyright: Copyright &copy; 2026 Colpal

theme:
  name: material
  logo: img/logo-dark.svg
  favicon: img/favicon.ico
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: blue
      accent: blue
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: black
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.tracking
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - content.action.edit

extra_css:
  - stylesheets/extra.css

plugins:
  - search
  - section-index
  - gen-files:
      scripts:
        - docs/gen_ref_pages.py
  - literate-nav:
      nav_file: SUMMARY.md
  - mkdocstrings:
      handlers:
        python:
          options:
            docstring_style: google
            show_source: true
            show_root_heading: true
            show_root_full_path: false
            show_symbol_type_heading: true
            show_symbol_type_toc: true
            members_order: source
            inherited_members: true
            show_signature_annotations: true
            separate_signature: true
            merge_init_into_class: true

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - admonition
  - pymdownx.details
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
      toc_depth: 3

nav:
  - Home: index.md
  - Introduction: introduction.md
  - Installation: installation.md
  - Modules:
    - modules/index.md
    - Command Line Arguments: modules/command-line.md
    - Secrets Handling: modules/secrets-handling.md
    - GCS Operations: modules/gcs-operations.md
    - Datastore Operations: modules/datastore-operations.md
    - Downloader: modules/downloader.md
    - Container Utils: modules/container-utils.md
    - Snowflake: modules/snowflake.md
  - Example Demos:
    - example-demos/index.md
    - Basic Usage: example-demos/basic.md
  - Migration Guides:
    - migration-guides/index.md
    - Migration to 1.0.0: migration-guides/migration-1.0.0.md
  - Contributing:
    - contributing/index.md
    - Creating Modules: contributing/creating-modules.md
    - Standards: contributing/standards.md
  - API Reference: reference/

extra:
  version:
    provider: mike
